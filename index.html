<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨笈 · 优雅Markdown阅读器</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=LXGW+WenKai:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Prism.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    
    <!-- Prism.js for code highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-jsx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-tsx.min.js"></script>
    
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Progress Bar -->
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Export Confirmation Modal -->
    <div class="export-confirm-modal" id="exportConfirmModal">
        <div class="export-confirm-content">
            <div class="export-confirm-icon">
                <i data-lucide="file-badge"></i>
            </div>
            <h3 class="export-confirm-title">导出为 PDF</h3>
            <p class="export-confirm-desc">即将把当前文档导出为 PDF 格式，保留字体样式和背景设置。</p>
            <div class="export-confirm-actions">
                <button class="export-confirm-btn cancel" id="exportConfirmCancel">取消</button>
                <button class="export-confirm-btn confirm" id="exportConfirmYes">确认导出</button>
            </div>
        </div>
    </div>

    <!-- Export Progress Modal -->
    <div class="export-modal" id="exportModal">
        <div class="export-modal-content">
            <div class="export-modal-header">
                <h3>正在导出...</h3>
            </div>
            <div class="export-modal-body">
                <div class="export-progress">
                    <div class="export-progress-bar">
                        <div class="export-progress-fill" id="exportProgressFill"></div>
                    </div>
                    <span class="export-progress-text" id="exportProgressText">准备中...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating TOC -->
    <nav class="floating-toc" id="floatingToc">
        <div class="floating-toc-nav" id="floatingTocNav">
            <!-- TOC items will be generated dynamically -->
        </div>
    </nav>

    <!-- Header -->
    <header class="header" id="header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo">
                    <i data-lucide="book-open" class="logo-icon"></i>
                    <span class="logo-text">墨笈</span>
                </div>
                <div class="file-info" id="fileInfo">
                    <span class="file-name" id="fileName"></span>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="homeBtn" title="返回主页">
                    <i data-lucide="home"></i>
                </button>
                <button class="icon-btn" id="exportBtn" title="导出 PDF">
                    <i data-lucide="download"></i>
                </button>
                <button class="icon-btn" id="tocBtn" title="目录导航">
                    <i data-lucide="list"></i>
                </button>
                <button class="icon-btn" id="settingsToggle" title="阅读设置">
                    <i data-lucide="settings-2"></i>
                </button>
                <button class="icon-btn" id="themeToggle" title="切换主题">
                    <i data-lucide="sun" class="theme-icon sun"></i>
                    <i data-lucide="moon" class="theme-icon moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Settings Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Settings Sidebar -->
    <aside class="settings-sidebar" id="settingsSidebar">
        <div class="sidebar-header">
            <h3 class="sidebar-title">阅读设置</h3>
            <button class="sidebar-close" id="sidebarClose">
                <i data-lucide="x"></i>
            </button>
        </div>
        
        <div class="sidebar-content">
            <!-- Width Setting -->
            <div class="setting-group">
                <label class="setting-label">
                    <i data-lucide="move-horizontal" class="setting-icon"></i>
                    <span>内容宽度</span>
                </label>
                <div class="setting-control">
                    <input type="range" id="widthSlider" min="500" max="1200" value="720" step="20">
                    <span class="setting-value" id="widthValue">720px</span>
                </div>
            </div>

            <!-- Font Family Setting -->
            <div class="setting-group">
                <label class="setting-label">
                    <i data-lucide="type" class="setting-icon"></i>
                    <span>正文字体</span>
                </label>
                <div class="setting-control">
                    <select id="fontSelect" class="setting-select">
                        <option value="Noto Sans SC, Source Han Sans CN, sans-serif">思源黑体</option>
                        <option value="Noto Serif SC, Source Han Serif CN, serif">思源宋体</option>
                        <option value="LXGW WenKai, sans-serif">霞鹜文楷</option>
                        <option value="system-ui, -apple-system, sans-serif">系统字体</option>
                    </select>
                </div>
            </div>

            <!-- Font Size Setting -->
            <div class="setting-group">
                <label class="setting-label">
                    <i data-lucide="text" class="setting-icon"></i>
                    <span>正文字号</span>
                </label>
                <div class="setting-control">
                    <button class="size-btn" id="fontSizeDown">
                        <i data-lucide="minus"></i>
                    </button>
                    <span class="setting-value" id="fontSizeValue">18px</span>
                    <button class="size-btn" id="fontSizeUp">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
            </div>

            <!-- Line Height Setting -->
            <div class="setting-group">
                <label class="setting-label">
                    <i data-lucide="align-center" class="setting-icon"></i>
                    <span>行高设置</span>
                </label>
                <div class="setting-control">
                    <input type="range" id="lineHeightSlider" min="1.4" max="2.4" value="1.9" step="0.1">
                    <span class="setting-value" id="lineHeightValue">1.9</span>
                </div>
            </div>

            <!-- Background Setting -->
            <div class="setting-group">
                <label class="setting-label">
                    <i data-lucide="palette" class="setting-icon"></i>
                    <span>阅读背景</span>
                </label>
                
                <!-- Background Tabs -->
                <div class="bg-tabs">
                    <button class="bg-tab active" data-tab="solid">纯色</button>
                    <button class="bg-tab" data-tab="artistic">文艺</button>
                    <button class="bg-tab" data-tab="chinese">国风</button>
                    <button class="bg-tab" data-tab="stationery">信笺</button>
                </div>

                <!-- Solid Colors -->
                <div class="bg-panel active" id="solidPanel">
                    <div class="bg-grid">
                        <button class="bg-option" data-bg="solid" data-color="#FAFAF8" style="background:#FAFAF8" title="米白"></button>
                        <button class="bg-option" data-bg="solid" data-color="#F5F5DC" style="background:#F5F5DC" title="米黄"></button>
                        <button class="bg-option" data-bg="solid" data-color="#E8F5E9" style="background:#E8F5E9" title="浅草绿"></button>
                        <button class="bg-option" data-bg="solid" data-color="#E3F2FD" style="background:#E3F2FD" title="淡蓝"></button>
                        <button class="bg-option" data-bg="solid" data-color="#FFF3E0" style="background:#FFF3E0" title="杏仁"></button>
                        <button class="bg-option" data-bg="solid" data-color="#FCE4EC" style="background:#FCE4EC" title="淡粉"></button>
                        <button class="bg-option" data-bg="solid" data-color="#F3E5F5" style="background:#F3E5F5" title="淡紫"></button>
                        <button class="bg-option" data-bg="solid" data-color="#EFEBE9" style="background:#EFEBE9" title="暖灰"></button>
                    </div>
                </div>

                <!-- Artistic Patterns -->
                <div class="bg-panel" id="artisticPanel">
                    <div class="bg-grid">
                        <button class="bg-option artistic" data-bg="artistic" data-pattern="dots" title="圆点" 
                            style="background-color:#FAFAF8; background-image: radial-gradient(circle, #ccc 1px, transparent 1px); background-size: 20px 20px;"></button>
                        <button class="bg-option artistic" data-bg="artistic" data-pattern="lines" title="横线" 
                            style="background-color:#FAFAF8; background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, #e0e0e0 28px); background-size: 100% 28px;"></button>
                        <button class="bg-option artistic" data-bg="artistic" data-pattern="grid" title="网格" 
                            style="background-color:#FAFAF8; background-image: linear-gradient(#e0e0e0 1px, transparent 1px), linear-gradient(90deg, #e0e0e0 1px, transparent 1px); background-size: 20px 20px;"></button>
                        <button class="bg-option artistic" data-bg="artistic" data-pattern="diamond" title="菱形" 
                            style="background-color:#FAFAF8; background-image: linear-gradient(45deg, #e8e8e8 25%, transparent 25%), linear-gradient(-45deg, #e8e8e8 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e8e8e8 75%), linear-gradient(-45deg, transparent 75%, #e8e8e8 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;"></button>
                    </div>
                </div>

                <!-- Chinese Style Patterns -->
                <div class="bg-panel" id="chinesePanel">
                    <div class="bg-grid">
                        <button class="bg-option chinese" data-bg="chinese" data-pattern="cloud" title="云纹" 
                            style="background-color:#F5F5DC; background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgdmlld0JveD0iMCAwIDYwIDYwIj48Y2lyY2xlIGN4PSIzMCIgY3k9IjMwIiByPSIyMCIgZmlsbD0iI2M0YzRiMCIgb3BhY2l0eT0iMC4zIi8+PHBhdGggZD0iTTMwIDI1YzcuMDggMCAxMy01LjcyIDEzLTEzbC0xMyAwIDEzIDV6Ii8+PC9zdmc+'); background-size: 60px 60px;"></button>
                        <button class="bg-option chinese" data-bg="chinese" data-pattern="wave" title="水波" 
                            style="background-color:#E3F2FD; background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgdmlld0JveD0iMCAwIDYwIDYwIj48cGF0aCBkPSJNMzAgMzBjNy4wOCAwIDEzLTUuNzIgMTMtMTMgMEM0My4wOCA3LjIgMzcuMzYgMCAzMCAwIDIyLjY0IDAgMTcuODIgNy4yIDEwIDEzcTEzIDcuMDggMTMgMTMgMy43MiA3LjA4IDIgMTMgMS43MiAzMyAweiIvPjxwYXRoIGQ9Ik0zMCA1MGM3LjA4IDAgMTMtNS43MiAxMy0xMyBMMzAgMjggMTcgNDF6Ii8+PC9zdmc+'); background-size: 40px 40px;"></button>
                        <button class="bg-option chinese" data-bg="chinese" data-pattern="bamboo" title="竹节" 
                            style="background-color:#E8F5E9; background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI2MCIgdmlld0JveD0iMCAwIDQwIDYwIj48cmVjdCBmaWxsPSIjOTBjNjk1IiBvcGFjaXR5PSIwLjIiIHdpZHRoPSI0MCIgaGVpZ2h0PSI2MCIvPjxyZWN0IGZpbGw9IiM3OGE4N2QiIG9wYWNpdHk9IjAuNCIgeD0iNSIgeT0iMCIgd2lkdGg9IjMwIiBoZWlnaHQ9IjgiIHJ4PSI0Ii8+PHJlY3QgZmlsbD0iIzc4YTg3ZCIgb3BhY2l0eT0iMC40IiB4PSI1IiB5PSIxNSIgd2lkdGg9IjMwIiBoZWlnaHQ9IjgiIHJ4PSI0Ii8+PHJlY3QgZmlsbD0iIzc4YTg3ZCIgb3BhY2l0eT0iMC40IiB4PSI1IiB5PSIzMCIgd2lkdGg9IjMwIiBoZWlnaHQ9IjgiIHJ4PSI0Ii8+PHJlY3QgZmlsbD0iIzc4YTg3ZCIgb3BhY2l0eT0iMC40IiB4PSI1IiB5PSI0NSIgd2lkdGg9IjMwIiBoZWlnaHQ9IjgiIHJ4PSI0Ii8+PC9zdmc+'); background-size: 40px 60px;"></button>
                        <button class="bg-option chinese" data-bg="chinese" data-pattern="fish" title="鱼鳞" 
                            style="background-color:#E3F2FD; background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0OCIgaGVpZ2h0PSI0OCIgdmlld0JveD0iMCAwIDQ4IDQ4Ij48cGF0aCBkPSJNMCA0OEMxMiA1NiAzNiA1NiA0OCAzMmMtMTIgLTEyIC0zNiAtMTIgLTQ4IDB6bTQ4LTI0QzM2IDEyIDEyIDEyIDAgMjQsMTIgNDAgMzYgNDAgNDggMzJ6IiBmaWxsPSIjYTBjNGU4IiBvcGFjaXR5PSIwLjQiLz48L3N2Zz4='); background-size: 48px 48px;"></button>
                    </div>
                </div>

                <!-- Stationery Backgrounds -->
                <div class="bg-panel" id="stationeryPanel">
                    <div class="bg-grid">
                        <button class="bg-option stationery" data-bg="stationery" data-pattern="notebook" title="笔记本" 
                            style="background-color:#FFFFFF; background-image: linear-gradient(#f0f0f0 1px, transparent 1px); background-size: 100% 28px;"></button>
                        <button class="bg-option stationery" data-bg="stationery" data-pattern="cornell" title="康奈尔" 
                            style="background-color:#FFFFFF; background-image: linear-gradient(#e8e8e8 1px, transparent 1px), linear-gradient(90deg, #e8e8e8 1px, transparent 1px); background-size: 100% 28px, 200px 100%; background-position: 0 14px, 0 0;"></button>
                        <button class="bg-option stationery" data-bg="stationery" data-pattern="legal" title="法律纸" 
                            style="background-color:#FFFFFF; background-image: linear-gradient(90deg, transparent 39px, #e74c3c 39px, #e74c3c 41px, transparent 41px), linear-gradient(#f0f0f0 1px, transparent 1px); background-size: 100% 28px, 100% 28px; background-position: 0 0, 0 14px;"></button>
                        <button class="bg-option stationery" data-bg="stationery" data-pattern="graph" title="方格纸" 
                            style="background-color:#FFFFFF; background-image: linear-gradient(#c8d6e5 1px, transparent 1px), linear-gradient(#c8d6e5 1px, transparent 1px); background-size: 20px 20px;"></button>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
        <!-- Welcome Screen (Drop Zone) -->
        <div class="welcome-screen" id="welcomeScreen">
            <label for="fileInput" class="welcome-content">
                <div class="welcome-icon">
                    <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="60" cy="60" r="50" stroke="currentColor" stroke-width="2" stroke-dasharray="8 4" opacity="0.3"/>
                        <rect x="35" y="30" width="50" height="60" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
                        <line x1="42" y1="45" x2="78" y2="45" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="42" y1="55" x2="70" y2="55" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="42" y1="65" x2="75" y2="65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="42" y1="75" x2="60" y2="75" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h2 class="welcome-title">优雅地阅读Markdown</h2>
                <p class="welcome-desc">拖拽文件到此处，或点击选择文件</p>
                <div class="welcome-formats">
                    <span class="format-badge">.md</span>
                    <span class="format-badge">.txt</span>
                </div>
            </label>
            <input type="file" id="fileInput" accept=".md,.txt">
        </div>

        <!-- Reading Area -->
        <div class="reading-area" id="readingArea">
            <article class="markdown-content" id="markdownContent">
                <!-- Markdown content will be rendered here -->
            </article>
        </div>
    </main>

    <!-- Status Bar -->
    <footer class="status-bar" id="statusBar">
        <div class="status-content">
            <div class="status-item">
                <i data-lucide="clock" class="status-icon"></i>
                <span id="readingTime">0 分钟</span>
            </div>
            <div class="status-item">
                <i data-lucide="type" class="status-icon"></i>
                <span id="wordCount">0 字</span>
            </div>
            <div class="status-item progress-text">
                <i data-lucide="bookmark" class="status-icon"></i>
                <span id="progressPercent">0%</span>
            </div>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-message" id="toastMessage"></span>
    </div>

    <!-- html2canvas for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="scripts/app.js"></script>
</body>
</html>
